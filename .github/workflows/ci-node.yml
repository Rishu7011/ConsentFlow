name: "Frontend & Extension CI"

on:
  push:
    branches: [main]
    paths:
      - 'consentflow-frontend/**'
      - 'consentflow-extension/**'
      - '.github/workflows/ci-node.yml'
  pull_request:
    branches: [main]
    paths:
      - 'consentflow-frontend/**'
      - 'consentflow-extension/**'
      - '.github/workflows/ci-node.yml'

jobs:
  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consentflow-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: consentflow-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint --if-present

      - name: Run Build
        run: npm run build

  extension-ci:
    name: Extension CI (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consentflow-extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: consentflow-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest Tests
        run: npm test
